name: Build

on:
  push:
    branches: ["main", "copilot/**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_call:
    inputs:
      build_type:
        description: "Build type override (release, prerelease, test)"
        required: false
        type: string
        default: ""
    outputs:
      test-artifact-name:
        description: "Name of the test APK artifact (unsigned)"
        value: ${{ jobs.build.outputs.test-artifact-name }}
      prod-release-artifact-name:
        description: "Name of the prod release APK artifact (unsigned)"
        value: ${{ jobs.build.outputs.prod-release-artifact-name }}
      jnilibs-artifact-name:
        description: "Name of the shared Android native-libraries artifact"
        value: ${{ jobs.build.outputs.jnilibs-artifact-name }}

permissions:
  contents: read

# Restrict Rust compiler-cache *writes* to trusted refs (main + release tags).
# Pull requests and feature branches still restore the cache read-only, so an
# untrusted/unauthorized PR can never poison the shared cache.
env:
  RUST_CACHE_SAVE: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full git history for version calculation
          fetch-tags: true
          submodules: recursive

      - name: Determine Build Type
        id: build-type
        run: |
          # Determine CI_BUILD_TYPE based on the event that triggered the workflow
          # - release: tagged release (v*)
          # - prerelease: main branch push
          # - test: pull request
          if [[ -n "${{ inputs.build_type }}" ]]; then
            echo "CI_BUILD_TYPE=${{ inputs.build_type }}" >> $GITHUB_ENV
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "CI_BUILD_TYPE=release" >> $GITHUB_ENV
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            echo "CI_BUILD_TYPE=prerelease" >> $GITHUB_ENV
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            echo "CI_BUILD_TYPE=test" >> $GITHUB_ENV
          else
            echo "CI_BUILD_TYPE=local" >> $GITHUB_ENV
          fi
          echo "Build type: $CI_BUILD_TYPE"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      # Host-only toolchain: lint + unit tests build the Rust libs for the host
      # (via Gradle's cargoHostBuild), never the Android targets, so no NDK or
      # cargo-ndk is needed in this job.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (host)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: host
          save-if: ${{ env.RUST_CACHE_SAVE == 'true' }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5.0.2

      - name: Rust format check
        run: |
          cargo fmt --all -- --check
        working-directory: rust/letterbox-core

      - name: Rust format check (proxy)
        run: |
          cargo fmt --all -- --check
        working-directory: rust/letterbox-proxy

      - name: Rust tests
        run: cargo test
        working-directory: rust/letterbox-core

      - name: Rust tests (proxy)
        run: cargo test
        working-directory: rust/letterbox-proxy

      - name: Gradle permissions
        run: chmod +x gradlew

      - name: Android lint
        run: ./gradlew lint --no-daemon

      - name: Android unit tests (including FFI integration tests)
        # Gradle's test task depends on cargoHostBuild which builds both letterbox-core
        # and letterbox-proxy libraries to target/release/ before running tests
        run: ./gradlew test --no-daemon

  warp-smoke-test:
    name: Real WARP smoke test
    runs-on: ubuntu-24.04
    # The full privacy path (provision a real WARP device -> WireGuard handshake
    # -> DoH -> TLS -> HTTP image fetch -> delete device) is exercised against
    # live Cloudflare here. It is inherently flaky (network, rate limits, anycast
    # routing), so a failure is surfaced as a warning and never gates the build.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (proxy host)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/letterbox-proxy
          shared-key: warp
          save-if: ${{ env.RUST_CACHE_SAVE == 'true' }}

      - name: Run real Cloudflare WARP end-to-end test
        id: warp
        # Non-blocking: the step may fail without failing the job. The outcome is
        # inspected below and turned into a warning annotation when it does not pass.
        continue-on-error: true
        working-directory: rust/letterbox-proxy
        run: cargo test --test warp_real -- --ignored --nocapture

      - name: Report WARP test outcome
        if: always()
        run: |
          if [[ "${{ steps.warp.outcome }}" == "success" ]]; then
            echo "Real Cloudflare WARP end-to-end test passed."
          else
            echo "::warning title=Real WARP test failed::The live Cloudflare WARP end-to-end test did not pass (outcome: ${{ steps.warp.outcome }}). This is non-blocking and is most often transient network/anycast/rate-limit flakiness, but should be investigated if it persists."
          fi

  build:
    name: Build APKs
    runs-on: ubuntu-24.04
    needs: lint-and-test
    outputs:
      test-artifact-name: ${{ steps.artifact-names.outputs.test }}
      prod-release-artifact-name: ${{ steps.artifact-names.outputs.prod-release }}
      jnilibs-artifact-name: ${{ steps.artifact-names.outputs.jnilibs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full git history for version calculation
          fetch-tags: true
          submodules: recursive

      - name: Determine Build Type
        id: build-type
        run: |
          # Determine CI_BUILD_TYPE based on the event that triggered the workflow
          if [[ -n "${{ inputs.build_type }}" ]]; then
            echo "CI_BUILD_TYPE=${{ inputs.build_type }}" >> $GITHUB_ENV
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "CI_BUILD_TYPE=release" >> $GITHUB_ENV
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            echo "CI_BUILD_TYPE=prerelease" >> $GITHUB_ENV
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            echo "CI_BUILD_TYPE=test" >> $GITHUB_ENV
          else
            echo "CI_BUILD_TYPE=local" >> $GITHUB_ENV
          fi
          echo "Build type: $CI_BUILD_TYPE"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      # The Android NDK only ships a linux-x86_64 host toolchain, so this Android
      # cross-compile must run on an amd64 runner (ubuntu-24.04); an arm64 runner
      # cannot execute the NDK clang. The optimized release libraries are built
      # once here and shared with downstream jobs via the jniLibs artifact.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Rust build (android)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: android
          save-if: ${{ env.RUST_CACHE_SAVE == 'true' }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked || true

      - name: Install and pin NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Gradle permissions
        run: chmod +x gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5.0.2

      # Single workspace invocation builds both letterbox-core and letterbox-proxy
      # for all three ABIs in one pass, reusing the compiled dependency graph
      # across the two crates (the previous two per-crate invocations recompiled
      # the shared dependencies twice).
      - name: Build Android native libraries (release, all ABIs)
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 -o ${{ github.workspace }}/app/src/main/jniLibs build --manifest-path ${{ github.workspace }}/Cargo.toml --release
        working-directory: rust

      - name: Verify native libraries were generated
        run: |
          echo "Checking for generated .so files in jniLibs:"
          find ${{ github.workspace }}/app/src/main/jniLibs -maxdepth 2 -type f -name "*.so" -print
          if [ -z "$(find ${{ github.workspace }}/app/src/main/jniLibs -maxdepth 2 -type f -name "*.so")" ]; then
            echo "ERROR: No .so files found in jniLibs!"
            exit 1
          fi
          echo "Verifying both letterbox_core and letterbox_proxy libraries:"
          find ${{ github.workspace }}/app/src/main/jniLibs -type f -name "*letterbox_core*.so" | head -1 || (echo "ERROR: letterbox_core not found!" && exit 1)
          find ${{ github.workspace }}/app/src/main/jniLibs -type f -name "*letterbox_proxy*.so" | head -1 || (echo "ERROR: letterbox_proxy not found!" && exit 1)

      # Share the freshly built native libraries so the instrumented UI test
      # workflow downloads them instead of paying for a second Android cross-compile.
      - name: Upload shared native libraries artifact
        uses: actions/upload-artifact@v7
        with:
          name: letterbox-jnilibs
          path: app/src/main/jniLibs
          retention-days: 7
          if-no-files-found: error

      - name: Build test debug APK
        run: ./gradlew assembleStagingDebug --no-daemon

      - name: Build prod release APK
        run: ./gradlew assembleProdRelease --no-daemon

      - name: Verify native libraries in APKs
        run: |
          echo "Checking for .so files in test debug APK:"
          unzip -l app/build/outputs/apk/staging/debug/*.apk "lib/*/*.so" || (echo "ERROR: No .so files found in test debug APK!" && exit 1)
          echo "Checking for .so files in prod release APK:"
          unzip -l app/build/outputs/apk/prod/release/*.apk "lib/*/*.so" || (echo "ERROR: No .so files found in prod release APK!" && exit 1)

      - name: Set artifact names
        id: artifact-names
        run: |
          echo "test=letterbox-staging-apk" >> $GITHUB_OUTPUT
          echo "prod-release=letterbox-prod-release-unsigned-apk" >> $GITHUB_OUTPUT
          echo "jnilibs=letterbox-jnilibs" >> $GITHUB_OUTPUT

      - name: Upload test APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-names.outputs.test }}
          path: app/build/outputs/apk/staging/debug/*.apk
          retention-days: 30

      - name: Upload prod release APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-names.outputs.prod-release }}
          path: app/build/outputs/apk/prod/release/*.apk
          retention-days: 30

      - name: Upload test androidTest APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: letterbox-staging-androidTest-apk
          path: app/build/outputs/apk/androidTest/staging/debug/*.apk
          retention-days: 30
          if-no-files-found: ignore
